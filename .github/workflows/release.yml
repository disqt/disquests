name: Release

on:
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write
  attestations: write

jobs:
  e2e:
    uses: ./.github/workflows/e2e-test.yml

  release:
    needs: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # --- Checkout (full history + tags for changelog) ---
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 25

      - uses: gradle/actions/setup-gradle@4c125117fe7c5aed11272ec4213f602f012f89f2 # v5

      # --- Build ---
      - name: Build all JARs
        run: ./gradlew build

      # --- Generate SBOM ---
      - name: Generate SBOM
        run: ./gradlew cyclonedxBom

      # --- Generate changelog ---
      - name: Generate changelog
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"

          # Find previous tag in v*.*.* format (no hyphen suffix)
          PREV_TAG=$(git tag --list 'v[0-9]*' --sort=-v:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | grep -v "^${TAG}$" \
            | head -n1)

          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${TAG}"
            echo "Changelog range: $RANGE"
          else
            RANGE="$TAG"
            echo "First release, including all commits"
          fi

          FEATURES=""
          FIXES=""

          while IFS= read -r line; do
            HASH=$(echo "$line" | cut -d' ' -f1)
            MSG=$(echo "$line" | cut -d' ' -f2-)
            # Strip conventional commit prefix and optional scope
            DESC=$(echo "$MSG" | sed -E 's/^(feat|fix)(\([^)]*\))?:[[:space:]]*//')

            if echo "$MSG" | grep -qE '^feat(\(|:)'; then
              FEATURES="${FEATURES}- ${DESC} (${HASH})\n"
            elif echo "$MSG" | grep -qE '^fix(\(|:)'; then
              FIXES="${FIXES}- ${DESC} (${HASH})\n"
            fi
          done < <(git log --oneline "$RANGE" 2>/dev/null || git log --oneline "$TAG")

          BODY=""
          if [ -n "$FEATURES" ]; then
            BODY="## Features\n${FEATURES}\n"
          fi
          if [ -n "$FIXES" ]; then
            BODY="${BODY}## Fixes\n${FIXES}"
          fi
          if [ -z "$BODY" ]; then
            BODY="Maintenance release."
          fi

          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          # Write body to a file to preserve newlines
          printf '%b' "$BODY" > /tmp/changelog.md
          cat /tmp/changelog.md

      # --- Create release ---
      - name: Rename artifacts
        run: |
          VERSION="${{ steps.changelog.outputs.VERSION }}"
          cp client/build/libs/client.jar "disquests-client-${VERSION}.jar"
          cp server/build/libs/server.jar "disquests-paper-${VERSION}.jar"
          cp build/reports/cyclonedx/bom.json "disquests-sbom-${VERSION}.json"

      # --- Attest build provenance (sigstore) ---
      - name: Attest client JAR
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: disquests-client-${{ steps.changelog.outputs.VERSION }}.jar

      - name: Attest server JAR
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: disquests-paper-${{ steps.changelog.outputs.VERSION }}.jar

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.changelog.outputs.VERSION }}"
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --repo disqt/disquests \
            --title "Disquests v${VERSION}" \
            --notes-file /tmp/changelog.md \
            "disquests-client-${VERSION}.jar" \
            "disquests-paper-${VERSION}.jar" \
            "disquests-sbom-${VERSION}.json"
