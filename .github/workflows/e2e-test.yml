name: E2E Tests

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main]

jobs:
  e2e-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle.properties', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Cache Loom assets
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches/fabric-loom
          key: loom-${{ hashFiles('gradle.properties') }}
          restore-keys: loom-

      - name: Build all JARs
        run: ./gradlew build

      - name: Configure server
        run: |
          mkdir -p paper/run/plugins/BuildNotes
          cat > paper/run/server.properties << 'PROPS'
          online-mode=false
          enable-rcon=true
          rcon.password=testpassword
          rcon.port=25575
          level-type=flat
          difficulty=peaceful
          spawn-protection=0
          max-players=2
          PROPS
          echo '{"allowAll":true,"editors":[]}' > paper/run/plugins/BuildNotes/permissions.json

      - name: Start Paper server
        run: |
          ./gradlew :paper:runServer --no-daemon -x test > paper/run/server-stdout.log 2>&1 &
          echo $! > paper/run/server.pid
          timeout 120 bash -c 'until grep -q "Done" paper/run/logs/latest.log 2>/dev/null; do sleep 2; done'
          echo "Paper server started"

      - name: Run E2E tests
        run: |
          sudo apt-get install -y xvfb
          Xvfb :99 -ac -screen 0 854x480x24 &
          sleep 2
          DISPLAY=:99 ./gradlew runClientGameTest
        timeout-minutes: 10

      - name: Stop Paper server
        if: always()
        run: |
          if [ -f paper/run/server.pid ]; then
            kill "$(cat paper/run/server.pid)" 2>/dev/null || true
          fi

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: |
            client/build/run/clientGameTest/screenshots/
            client/build/run/clientGameTest/logs/
            paper/run/logs/
            paper/run/server-stdout.log
          retention-days: 14
