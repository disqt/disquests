name: E2E Tests

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  e2e-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle.properties', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Cache Loom assets
        uses: actions/cache@v5
        with:
          path: ~/.gradle/caches/fabric-loom
          key: loom-${{ hashFiles('gradle.properties') }}
          restore-keys: loom-

      - name: Build all JARs
        run: ./gradlew build

      - name: Run integration tests
        run: |
          sudo apt-get install -y xvfb
          Xvfb :99 -ac -screen 0 854x480x24 &
          sleep 2
          DISPLAY=:99 ./gradlew :client:runIntegrationTest
        timeout-minutes: 10

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-results
          path: |
            client/run/logs/
            client/run-b/logs/
            server/run/logs/
            integration-sync/
          retention-days: 14
